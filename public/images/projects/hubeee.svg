<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">DevHub project cover</title>
  <desc id="desc">A stylized terminal cover for the DevHub workspace manager project.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7cc" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#292524" />
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)" />
  <g transform="translate(80 78)">
    <rect x="0" y="0" width="1040" height="564" rx="36" fill="#000000" />
    <rect x="18" y="18" width="1004" height="528" rx="24" fill="url(#panel)" />
    <circle cx="62" cy="56" r="12" fill="#ef4444" />
    <circle cx="98" cy="56" r="12" fill="#f59e0b" />
    <circle cx="134" cy="56" r="12" fill="#22c55e" />
    <text x="184" y="66" fill="#f5f5f4" font-family="monospace" font-size="28">devhub ~/workspace</text>

    <text x="60" y="154" fill="#fde68a" font-family="monospace" font-size="26">$ devhub --path ~/Dev</text>
    <text x="60" y="206" fill="#86efac" font-family="monospace" font-size="78" font-weight="700">DEVHUB</text>
    <text x="60" y="254" fill="#d6d3d1" font-family="monospace" font-size="26">Terminal workspace manager for developers</text>

    <g transform="translate(60 308)">
      <rect x="0" y="0" width="288" height="170" rx="18" fill="#18181b" stroke="#facc15" stroke-width="4" />
      <text x="22" y="34" fill="#fef3c7" font-family="monospace" font-size="22">Projects</text>
      <text x="22" y="72" fill="#a3e635" font-family="monospace" font-size="20">rust-cli        active</text>
      <text x="22" y="102" fill="#93c5fd" font-family="monospace" font-size="20">portfolio       starred</text>
      <text x="22" y="132" fill="#fca5a5" font-family="monospace" font-size="20">api-service     stale</text>
    </g>

    <g transform="translate(382 308)">
      <rect x="0" y="0" width="268" height="170" rx="18" fill="#18181b" stroke="#facc15" stroke-width="4" />
      <text x="22" y="34" fill="#fef3c7" font-family="monospace" font-size="22">Git</text>
      <text x="22" y="72" fill="#d6d3d1" font-family="monospace" font-size="20">branch: main</text>
      <text x="22" y="102" fill="#d6d3d1" font-family="monospace" font-size="20">changed: 4 files</text>
      <text x="22" y="132" fill="#d6d3d1" font-family="monospace" font-size="20">health: 92 / 100</text>
    </g>

    <g transform="translate(684 308)">
      <rect x="0" y="0" width="278" height="170" rx="18" fill="#18181b" stroke="#facc15" stroke-width="4" />
      <text x="22" y="34" fill="#fef3c7" font-family="monospace" font-size="22">Actions</text>
      <text x="22" y="72" fill="#fcd34d" font-family="monospace" font-size="20">/ search</text>
      <text x="22" y="102" fill="#fcd34d" font-family="monospace" font-size="20">g git menu</text>
      <text x="22" y="132" fill="#fcd34d" font-family="monospace" font-size="20">W save session</text>
    </g>
  </g>
</svg>
